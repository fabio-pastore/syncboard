<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <style>
        body,html {
            margin: 0;
            padding: 0;
        }
        #container {
            width: 100vw; height: 100vh;
            overflow: hidden;
        }
    </style>
    
    <title>SyncBoard Alpha</title>
</head>
<body>
    <select id="tool">
        <option value="pennello">✏️</option>
        <option value="gomma">🧽</option>
        <option value="evidenziatore">🖍️</option>
    </select>
    Brush size <input type="range" id="brushSize" min="1" max="20" step="1" value="3"> 
    Brush color <input type="color" id="brushColor">
    <button id="clearButton">Clear</button>
    <div id="container" style="border: 2px solid black"></div>

    <script>
        const SIZE = 10000;
        const tool = document.getElementById("tool");
        const stage = new Konva.Stage({
            container: 'container',
            width: window.innerWidth,
            height: window.innerHeight
        });

        const layer = new Konva.Layer();
        stage.add(layer);

        let painting = false;
        let current;

        stage.on('mousedown pointerdown', () => {

            painting = true;
            const pos = stage.getPointerPosition();

            if (tool.value === 'gomma') return;
            const evidenziatore = tool.value === 'evidenziatore';
            current = new Konva.Line({
                stroke: evidenziatore ? 'yellow' : 'black',
                strokeWidth: evidenziatore ? 30 : 3,
                lineCap: evidenziatore ? 'square' : 'round', // change to square if evidenziatore
                lineJoin: 'round',
                opacity: evidenziatore ? 0.2 : 1,
                tension: evidenziatore ? 0 : 0.35, // 0 if evidenziatore
                points: evidenziatore ? [pos.x, pos.y] : [pos.x, pos.y, pos.x, pos.y]
            });
            layer.add(current); 
        });

        stage.on('touchmove', (event) => {
            event.evt.preventDefault();
        })

        stage.on('mousemove pointermove', () => {
            if (!painting) return;

            const pos = stage.getPointerPosition();

            if (tool.value === 'gomma') {
                const shape = layer.getIntersection(pos);
                if (shape && shape.getClassName() == 'Line') {
                    shape.destroy();
                    layer.batchDraw();
                }

                return;
            }

            const points = current.points();
            console.log(points);

            const lx = points[points.length - 2];
            const ly = points[points.length - 1];
            
            const mx = pos.x - lx;
            const my = pos.y - ly;

            if (Math.sqrt(mx ** 2 + my ** 2) >= 3) {
                current.points(points.concat([pos.x, pos.y]));
                layer.batchDraw();
            }
        });

        stage.on('mouseup pointerup', () => {
            painting = false;
            // if (current) {
            //     current.tension(0.35);
            // }
            if (current && tool.value === 'evidenziatore') {
                current.globalCompositeOperation('multiply');
            }
        });

        stage.on('mouseleave pointerleave', () => {
            painting = false;
        });

        window.addEventListener('resize', () => {
            // document.getElementById('container').style.width = window.innerWidth + 'px';
            // document.getElementById('container').style.height = window.innerHeight + 'px';
            stage.width(window.innerWidth);
            stage.height(window.innerHeight);
        });
    </script>
</body>

</html>
