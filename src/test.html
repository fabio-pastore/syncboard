        body,html {
            margin: 0;

<body>
    <p>Test</p>
    <div id="container" style="border: 2px solid black"></div>

    <script>
        // es konva
        const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight
        });

        const layer = new Konva.Layer();
        stage.add(layer);

        let painting = false;
        let current;

        stage.on('mousedown touchstart', () => {
            painting = true;

            const pos = stage.getPointerPosition();
            console.log(pos);

            current = new Konva.Line({
                stroke: 'black',
                strokeWidth: 3,
                lineCap: 'round',
                lineJoin: 'round',
                points: [pos.x, pos.y]
            });

            layer.add(current);
        });

        stage.on('mousemove touchmove', () => {
            if (!painting) return;

            const pos = stage.getPointerPosition();
            const temp = current.points().concat([pos.x, pos.y]);
            current.points(temp);
        })

        stage.on('mouseup touchend', () => {
            painting = false;
        })
