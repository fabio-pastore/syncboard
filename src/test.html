<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <style>
        body,html {
            margin: 0;
            padding: 0;
        }
        #container {
            width: 100vw; height: 100vh;
            overflow: hidden;
        }
    </style>
    
    <title>SyncBoard Alpha</title>
</head>
<body>
    <select id="tool">
        <option value="pennello">✏️</option>
        <option value="gomma">🧽</option>
        <option value="evidenziatore">🖍️</option>
    </select>
    <span id="tool_menu"> <!--NOTE: default selection is 'pennello' aka brush -->
        Brush size <input type="range" id="tool_size" min="1" max="20" step="1" value="3"> 
        Brush color <input type="color" id="tool_color">
    </span> 
    <button id="clear_button">Clear</button>
    <div id="container" style="border: 2px solid black"></div>

    <script>
        const DEFAULT_BRUSH_COLOR = "#000000"; // black
        const DEFAULT_HIGHLIGHTER_COLOR = "#FFFF00"; // yellow
        const DEFAULT_BRUSH_SIZE = 3;
        const DEFAULT_HIGHLIGHTER_SIZE = 30;
        
        let brush_color = DEFAULT_BRUSH_COLOR;
        let brush_size = DEFAULT_BRUSH_SIZE;

        let highlighter_color = DEFAULT_HIGHLIGHTER_COLOR;
        let highlighter_size = DEFAULT_HIGHLIGHTER_SIZE;

        let panning = false;
        let panStart = { x: 0, y: 0 };
        const SIZE = 10000;
        const tool = document.getElementById("tool");
        const clear_btn = document.getElementById("clear_button");
        const stage = new Konva.Stage({
            container: 'container',
            width: window.innerWidth,
            height: window.innerHeight
        });

        const layer = new Konva.Layer();
        stage.add(layer);

        init_tool_input();
        clear_btn.addEventListener("click", () => layer.destroyChildren());
        
        tool.addEventListener("input", () => {
            let span_elem = document.getElementById("tool_menu");
            switch (tool.value) {
                case 'pennello':
                    span_elem.innerHTML = `Brush size <input type="range" id="tool_size" min="1" max="20" step="1" value="${brush_size}"> Brush color <input type="color" id="tool_color" value="${brush_color}">`;
                    break;
                case 'evidenziatore':
                    span_elem.innerHTML = `Highlighter size <input type="range" id="tool_size" min="5" max="50" step="1" value="${highlighter_size}"> Highlighter color <input type="color" id="tool_color" value="${highlighter_color}">`;
                    break;
                case 'gomma':
                    span_elem.innerHTML = `Eraser size <input type="range" id="tool_size" min="1" max="20" step="1" value="3">`; // update value with eraser size once implemented
            }
            init_tool_input(); // update color_picker and size_selector references and listeners accordingly
        });

        let painting = false;
        let current;

        stage.on('pointerdown', (e) => {
            if (e.evt.button !== 0) return;
            painting = true;
            const pos = stage.getPointerPosition();
            const wp = {
                x: (pos.x - layer.x()) / layer.scaleX(),
                y: (pos.y - layer.y()) / layer.scaleY()
            }

            if (tool.value === 'gomma') return;
            const evidenziatore = tool.value === 'evidenziatore';
            current = new Konva.Line({
                stroke: evidenziatore ? highlighter_color : brush_color,
                strokeWidth: evidenziatore ? highlighter_size : brush_size,
                lineCap: evidenziatore ? 'square' : 'round', // change to square if evidenziatore
                lineJoin: 'round',
                opacity: evidenziatore ? 0.2 : 1,
                tension: evidenziatore ? 0 : 0.35, // 0 if evidenziatore
                points: evidenziatore ? [wp.x, wp.y] : [wp.x, wp.y, wp.x, wp.y]
            });
            layer.add(current); 
        });
        
        let lc = null;
        let ld = 0;

        stage.on('touchmove', (event) => {
            event.evt.preventDefault();

            const touches = e.evt.touches;
            if (touches.length === 2) {
                painting = false;

                const p1 = {
                    x: touches[0].clientX,
                    y: touches[0].clientY
                };
                const p2 = {
                    x: touches[1].clientX,
                    y: touches[1].clientY
                };

                const c = {
                    x: (p1.x + p2.x) / 2,
                    y: (p2.y + p2.y) / 2
                };

                const d = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);

                if (!lc) {
                    lc = c;
                    ld = d;
                    return;
                }
                
                const s = layer.scaleX() * (d / ld);
                layer.scale({x: s, y: s});
                
                const dx = (lc.x - layer.yayer.x()) * layer.scaleX();
                
            }
        })

        stage.on('pointermove', (e) => {
            if (!painting) return;
            
            const pos = stage.getPointerPosition();
            const wp = {
                x: (pos.x - layer.x()) / layer.scaleX(),
                y: (pos.y - layer.y()) / layer.scaleY()
            }

            if (tool.value === 'gomma') {
                const shape = layer.getIntersection(pos);
                if (shape && shape.getClassName() == 'Line') {
                    shape.destroy();
                    layer.batchDraw();
                }

                return;
            }

            const points = current.points();
            console.log(points);

            const lx = points[points.length - 2];
            const ly = points[points.length - 1];
            
            const mx = wp.x - lx;
            const my = wp.y - ly;

            if (Math.sqrt(mx ** 2 + my ** 2) >= 3) {
                current.points(points.concat([wp.x, wp.y]));
                layer.batchDraw();
            }
        });

        stage.on('pointerup', () => {
            painting = false;
            // if (current) {
            //     current.tension(0.35);
            // }
            if (current && tool.value === 'evidenziatore') {
                current.globalCompositeOperation('multiply');
            }
        });

        stage.on('pointerleave', () => {
            painting = false;
        });

        stage.container().addEventListener('mousedown', (e) => {
            if (e.button === 1) e.preventDefault();
            if (e.button === 2) {
                panning = true;
                panStart = { x: e.clientX - layer.x(), y: e.clientY - layer.y() };
                e.preventDefault();
            }
        })

        stage.container().addEventListener('contextmenu', (e) => { // prevent default right-click behaviour
            e.preventDefault();
        })

        window.addEventListener('mousemove', (e) => {
            if (!panning) return;
            layer.x(e.clientX - panStart.x);
            layer.y(e.clientY - panStart.y);
            layer.batchDraw();
        })

        window.addEventListener('mouseup', (e) => {
            if (e.button === 2) panning = false;
        })

        window.addEventListener('resize', () => {
            // document.getElementById('container').style.width = window.innerWidth + 'px';
            // document.getElementById('container').style.height = window.innerHeight + 'px';
            stage.width(window.innerWidth);
            stage.height(window.innerHeight);
        });

        

        stage.container().addEventListener('wheel', (e) => {
            e.preventDefault();
            const scalefactor = 1.1;
            const old = layer.scaleX();

            const newscale = e.deltaY < 0 ? old * scalefactor : old / scalefactor;
            
            const pointer = stage.getPointerPosition();
            const wx = (pointer.x - layer.x()) / old;
            const wy = (pointer.y - layer.y()) / old;

            layer.scale({ x: newscale, y: newscale });

            layer.x(pointer.x - wx * newscale);
            layer.y(pointer.y - wy * newscale);
            layer.batchDraw();
        }, { passive: false });

        function init_tool_input() {
            color_picker = document.getElementById("tool_color");
            size_selector = document.getElementById("tool_size");
            size_selector.addEventListener("input", () => {
                if (tool.value == 'pennello') brush_size = size_selector.value;
                else if (tool.value == 'gomma') return; // change after eraser size implementation
                else highlighter_size = size_selector.value;
            });
            color_picker.addEventListener("input", () => {
                if (tool.value == 'pennello') brush_color = color_picker.value;
                else highlighter_color = color_picker.value;
            });
        }
    </script>
</body>

</html>
