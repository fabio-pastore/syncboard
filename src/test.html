<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>

    <style>
        body,html {
            margin: 0;
            padding: 0;
        }
        #container {
            width: 100vw; height: 100vh;
            overflow: hidden;
        }
    </style>
    
    <title>SyncBoard Alpha</title>
</head>
<body>
    <p>Test</p>
    <select id="tool">
        <option value="pennello">✏️</option>
        <option value="gomma">🧽</option>
    </select>
    <div id="container" style="border: 2px solid black"></div>

    <script>
        const SIZE = 10000;
        const tool = document.getElementById("tool");
        // es konva
        const stage = new Konva.Stage({
        container: 'container',
        width: SIZE,
        height: SIZE
        });

        const layer = new Konva.Layer();
        stage.add(layer);

        let painting = false;
        let current;

        stage.on('mousedown touchstart', () => {

            painting = true;
            const pos = stage.getPointerPosition();

            if (tool.value === 'gomma') return;
            
            current = new Konva.Line({
                stroke: 'black',
                strokeWidth: 3,
                lineCap: 'round',
                lineJoin: 'round',
                tension: 0.35,
                points: [pos.x, pos.y]
            });
            layer.add(current); 
        });

        stage.on('mousemove touchmove', () => {
            if (!painting) return;

            const pos = stage.getPointerPosition();

            if (tool.value === 'gomma') {
                const shape = layer.getIntersection(pos);
                if (shape && shape.getClassName() == 'Line') {
                    shape.destroy();
                    layer.batchDraw();
                }

                return;
            }

            const points = current.points();
            console.log(points);

            const lx = points[points.length - 2];
            const ly = points[points.length - 1];
            
            const mx = pos.x - lx;
            const my = pos.y - ly;

            if (Math.sqrt(mx ** 2 + my ** 2) > 5) {
                current.points(points.concat([pos.x, pos.y]));
            }
        });

        stage.on('mouseup touchend', () => {
            painting = false;
            // if (current) {
            //     current.tension(0.35);
            // }
        });

        stage.on('mouseleave pointerleave', () => {
            painting = false;
        });

        window.addEventListener('resize', () => {
            document.getElementById('container').style.width = window.innerWidth + 'px';
            document.getElementById('container').style.height = window.innerHeight + 'px';
        });
    </script>
</body>

</html>
